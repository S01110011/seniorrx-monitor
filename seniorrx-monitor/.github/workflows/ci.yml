name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: ruff check src tests scripts
      - run: mypy src

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - name: SAST (bandit) — vulnerabilidades no codigo Python
        run: bandit -r src -ll
      - name: Dependencias vulneraveis (pip-audit)
        run: pip-audit --strict || true  # nao bloqueia build por CVE transitiva; revisar no PR
      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: seniorrx
          POSTGRES_PASSWORD: seniorrx
          POSTGRES_DB: seniorrx_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U seniorrx"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      TEST_DATABASE_URL: postgresql+psycopg://seniorrx:seniorrx@localhost:5432/seniorrx_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - run: pytest --cov=seniorrx --cov-report=xml --cov-fail-under=80
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  docker-build:
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, security-scan, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -f Dockerfile -t seniorrx-api:ci .
      - name: Build dashboard image
        run: docker build -f Dockerfile.dashboard -t seniorrx-dashboard:ci .
