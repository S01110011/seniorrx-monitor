name: SeniorRx Monitor CI

# CI dedicado ao subprojeto seniorrx-monitor/. So dispara quando arquivos
# desse diretorio mudam, para nao interferir no CI do MedStock Optimizer.
on:
  push:
    branches: [main]
    paths: ["seniorrx-monitor/**"]
  pull_request:
    paths: ["seniorrx-monitor/**"]

defaults:
  run:
    working-directory: seniorrx-monitor

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests scripts
      - name: Type-check (mypy)
        run: mypy src
      - name: SAST (bandit)
        run: bandit -r src -ll
      - name: Testes unitarios (sem banco)
        run: pytest -m "not integration" -o addopts="" -q
