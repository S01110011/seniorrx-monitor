version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"

handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    level: INFO

loggers:
  seniorrx:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: WARNING
  handlers: [console]

# Nota de privacidade: nunca logar payloads de prescricao/paciente em texto
# livre em nivel INFO/DEBUG — logar apenas patient_id (UUID) e contadores.
